version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencias]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencias]
    # Só devDependencies existem; agrupa tudo num PR por semana.
    groups:
      dev-dependencies:
        patterns: ['*']
    ignore:
      # TS 7 (compilador nativo) quebra a geração de .d.ts do tsup
      # (rollup-plugin-dts). Reavaliar quando o tsup suportar o TS 7.
      - dependency-name: typescript
        update-types: [version-update:semver-major]
