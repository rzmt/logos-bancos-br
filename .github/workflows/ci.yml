name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint (biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Testes
        run: npm test

      - name: Build do pacote
        run: npm run build

      - name: Conteúdo do pacote (sanidade)
        run: npm pack --dry-run
