name: Publicar no npm

# Publica quando uma Release é criada no GitHub. Usa npm provenance:
# o pacote publicado fica criptograficamente rastreável a este repositório,
# commit e execução da Action. Requer o secret NPM_TOKEN (ver CONTRIBUTING.md).
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # exigido pelo npm provenance

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Testes
        run: npm test

      - name: Publicar
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
